<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>Live Comments</title>
    <script src="peer.js"></script>
    <script src="comments.js" defer></script>
    <link href="style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" href="favicon.png" />
  </head>
  <body>
    <h1>Live Comments</h1>
    <div style="display: flex; flex-direction: column;">
      <textarea id="comment-input"
          placeholder="(Write your comment here. [5, 100] characters.)"
          rows="8" cols="100"
          maxlength="100"></textarea>
      <div>
      Mark as private (only visible to Kutay):
      <input id="comment-private" type="checkbox">
      </div>
      <input id="comment-embed-url" placeholder="(Optional) Image URL to embed">
      <div></div>
      <button id="btn-send" disabled>...</button>
    </div>
    <h4>
      V V V
      (All comments here are anonymous and nobody endorses them. Don't take anything seriously.)
      V V V
    </h4>
    <section id="comments-section">
    </section>
  </body>
</html>
